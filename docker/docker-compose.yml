name: rently

services:
  # ---------------------------------------------------------------------------
  # Banco de dados — SQL Server
  # ---------------------------------------------------------------------------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rently-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - rently-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -No -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Backend — Rently.Api (.NET 10)
  # ---------------------------------------------------------------------------
  rently-api:
    build:
      context: ..
      dockerfile: src/Rently.Api/Dockerfile
    container_name: rently-api
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=${SQL_DB:-Rently};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      Jwt__Issuer: "${JWT_ISSUER:-rently-api}"
      Jwt__Audience: "${JWT_AUDIENCE:-rently-clients}"
      Jwt__SigningKey: "${JWT_SIGNING_KEY}"
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - rently-net

  # ---------------------------------------------------------------------------
  # Frontend — Angular 22 servido via Nginx
  # ---------------------------------------------------------------------------
  rently-web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: rently-web
    ports:
      - "${WEB_PORT:-4200}:80"
    depends_on:
      - rently-api
    networks:
      - rently-net

networks:
  rently-net:
    driver: bridge

volumes:
  mssql-data:
    driver: local
